<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Danh sách thân chủ CĐM Gia Định</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="app">

    <!-- ════════════════════════════════════
       SCREEN 1 — LIST
  ════════════════════════════════════ -->
    <div id="screen-list" class="screen active">

      <div class="app-bar">
        <div class="app-bar-top">
          <div class="bar-title">Danh sách thân chủ CĐM Gia Định</div>
        </div>
        <div class="progress-wrap">
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
          <div class="progress-label" id="progress-label">0 / 0 xong</div>
        </div>
      </div>

      <div class="search-row">
        <div class="search-wrap">
          <span class="search-icon">
            <svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" stroke-width="2" fill="none">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </span>
          <input class="search-input" id="search-input" type="search" placeholder="Tìm tên, địa chỉ..."
            autocomplete="off" />
        </div>
      </div>

      <div class="filter-row" id="filter-row"></div>

      <div class="empty-state hidden" id="empty-state">Không tìm thấy kết quả.</div>
      <div class="list-body" id="list-body"></div>

    </div><!-- /screen-list -->


    <!-- ════════════════════════════════════
       SCREEN 2 — DETAIL
  ════════════════════════════════════ -->
    <div id="screen-detail" class="screen">

      <div class="app-bar">
        <div class="app-bar-top">
          <button class="back-btn" onclick="showList()" aria-label="Quay lại">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </button>
          <div class="bar-title">Chi tiết</div>
        </div>
      </div>

      <div class="detail-body" id="detail-body">
        <!-- filled by JS -->
      </div>

    </div><!-- /screen-detail -->

  </div><!-- /app -->

  <script src="app.js"></script>
</body>

</html>
